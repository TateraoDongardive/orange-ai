<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrangeAI – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange:     #F97316;
      --orange-dark:#C2410C;
      --orange-lite:#FED7AA;
      --green:      #15803D;
      --green-lite: #DCFCE7;
      --bg:         #FFFBF5;
      --dark:       #1C1208;
      --mid:        #78350F;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center;
      justify-content: center;
      padding: 24px; position: relative; overflow: hidden;
    }
    .bg-orb1 {
      position: fixed; top: -100px; left: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, #FED7AA 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .bg-orb2 {
      position: fixed; bottom: -100px; right: -100px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, #DCFCE7 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .card {
      background: #fff; border: 1px solid #F5D0A0;
      border-radius: 24px; padding: 48px 40px;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 20px 60px #F9731615;
      animation: fadeUp 0.5s ease;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 900;
      color: var(--orange-dark); text-align: center;
      margin-bottom: 6px; text-decoration: none; display: block;
    }
    .logo span { color: var(--green); }
    .back-btn {
      display: block; text-align: center;
      color: var(--mid); text-decoration: none;
      font-size: 0.88rem; font-weight: 500;
      margin-bottom: 20px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--orange); }
    .card-subtitle {
      text-align: center; color: var(--mid);
      font-size: 0.9rem; margin-bottom: 32px;
    }
    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700;
      color: var(--dark); margin-bottom: 24px; text-align: center;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 0.85rem; font-weight: 500; color: var(--mid); }
    input {
      padding: 12px 16px; border: 1.5px solid #F5D0A0;
      border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: var(--dark); background: var(--bg);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px #F9731620; }
    input::placeholder { color: #C4A882; }
    .btn {
      width: 100%; padding: 14px;
      background: var(--orange); color: #fff;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px #F9731640;
    }
    .btn:hover { background: var(--orange-dark); transform: translateY(-2px); box-shadow: 0 8px 28px #F9731650; }
    .divider {
      text-align: center; margin: 20px 0;
      color: #C4A882; font-size: 0.85rem; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 40%; height: 1px; background: #F5D0A0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .register-link { text-align: center; font-size: 0.9rem; color: var(--mid); }
    .register-link a { color: var(--orange); font-weight: 600; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
    .error-box {
      background: #FEE2E2; border: 1px solid #FECACA;
      border-radius: 10px; padding: 12px 16px;
      color: #B91C1C; font-size: 0.88rem;
      margin-bottom: 16px; display: none;
    }
    .success-box {
      background: var(--green-lite); border: 1px solid #BBF7D0;
      border-radius: 10px; padding: 12px 16px;
      color: var(--green); font-size: 0.88rem;
      margin-bottom: 16px; display: none;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
  position: fixed;
  top: 20px;
  right: 24px;
  color: var(--mid);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 500;
  transition: color 0.2s;
  z-index: 10;
}

.back-btn:hover { 
  color: var(--orange); 
}
  </style>
</head>
<body>
   <a href="/" class="back-btn">← Back to Home</a>
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>

  <div class="card">
    <a href="/" class="logo">Orange<span>AI</span></a>
    <p class="card-subtitle">Orange Yield Prediction System</p>

    <h2>Welcome Back 👋</h2>

    <div class="success-box" id="success"></div>
    <div class="error-box"   id="error"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="e.g. rahul@gmail.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"/>
    </div>

    <button class="btn" onclick="login()">🍊 Login</button>

    <div class="divider">or</div>
    <div class="register-link">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>

<script>
async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  hideMessages();

  if (!email || !password) {
    showError('⚠️ Please fill in all fields!'); return;
  }

  try {
    const res  = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.status === 'success') {
      showSuccess('✅ Login successful! Redirecting...');
      setTimeout(() => window.location.href = '/predict', 1500);
    } else {
      showError('❌ ' + data.message);
    }
  } catch (e) {
    showError('❌ Cannot connect to server!');
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.style.display = 'block';
}
function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg; el.style.display = 'block';
}
function hideMessages() {
  document.getElementById('error').style.display   = 'none';
  document.getElementById('success').style.display = 'none';
}
</script>
</body>
</html>
